<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #0d1117;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #e6edf3;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  .gradient-bg {
    position: absolute;
    top: -200px;
    right: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,212,255,0.12) 0%, transparent 70%);
    border-radius: 50%;
  }

  .gradient-bg-2 {
    position: absolute;
    bottom: -150px;
    left: -100px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(109,179,63,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 80px;
    width: 100%;
    height: 100%;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(109,179,63,0.15);
    border: 1px solid rgba(109,179,63,0.3);
    color: #6db33f;
    font-size: 16px;
    font-weight: 600;
    padding: 8px 20px;
    border-radius: 999px;
    width: fit-content;
    margin-bottom: 32px;
    letter-spacing: 0.3px;
  }

  .badge::before {
    content: '';
    width: 8px;
    height: 8px;
    background: #6db33f;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  .name {
    font-size: 72px;
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 8px;
    letter-spacing: -1px;
  }

  .name .highlight {
    background: linear-gradient(135deg, #00d4ff, #6db33f);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .title {
    font-size: 28px;
    color: #8b949e;
    margin-bottom: 40px;
    font-weight: 400;
  }

  .stats {
    display: flex;
    gap: 48px;
  }

  .stat {
    display: flex;
    flex-direction: column;
  }

  .stat-value {
    font-size: 36px;
    font-weight: 800;
    color: #00d4ff;
    line-height: 1.2;
  }

  .stat-label {
    font-size: 14px;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }

  .tech-tags {
    display: flex;
    gap: 12px;
    margin-top: 40px;
  }

  .tag {
    padding: 6px 16px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .tag-green {
    background: rgba(109,179,63,0.15);
    border: 1px solid rgba(109,179,63,0.3);
    color: #6db33f;
  }

  .tag-cyan {
    background: rgba(0,212,255,0.12);
    border: 1px solid rgba(0,212,255,0.25);
    color: #00d4ff;
  }

  .tag-orange {
    background: rgba(255,152,0,0.12);
    border: 1px solid rgba(255,152,0,0.25);
    color: #ff9800;
  }

  .tag-purple {
    background: rgba(167,139,250,0.12);
    border: 1px solid rgba(167,139,250,0.25);
    color: #a78bfa;
  }

  .border-line {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #6db33f, #00d4ff, #a78bfa);
  }
</style>
</head>
<body>
  <div class="gradient-bg"></div>
  <div class="gradient-bg-2"></div>

  <div class="container">
    <div class="badge">Open to Work</div>

    <div class="name">
      Duong Duy <span class="highlight">Danh</span>
    </div>

    <div class="title">Backend Software Engineer</div>

    <div class="stats">
      <div class="stat">
        <span class="stat-value">4+</span>
        <span class="stat-label">Years Experience</span>
      </div>
      <div class="stat">
        <span class="stat-value">2</span>
        <span class="stat-label">Backend Stacks</span>
      </div>
      <div class="stat">
        <span class="stat-value">1M+</span>
        <span class="stat-label">Transactions / Year</span>
      </div>
      <div class="stat">
        <span class="stat-value">10+</span>
        <span class="stat-label">Integrations Built</span>
      </div>
    </div>

    <div class="tech-tags">
      <span class="tag tag-green">Spring Boot</span>
      <span class="tag tag-purple">Laravel</span>
      <span class="tag tag-cyan">Microservices</span>
      <span class="tag tag-orange">REST API</span>
      <span class="tag tag-cyan">PostgreSQL</span>
      <span class="tag tag-green">Docker</span>
    </div>
  </div>

  <div class="border-line"></div>
</body>
</html>
